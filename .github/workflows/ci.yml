name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Validate that every commit in a PR follows Conventional Commits. convco
  # skips merge commits by default, so conflict-resolution merges don't trip it.
  commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: taiki-e/install-action@v2
        with:
          tool: convco
      - name: Check PR commits
        run: >-
          convco check --ignore-reverts
          ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}

  check:
    name: Format, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Both toolchains are pinned in-repo, so CI and local dev compile with the
      # exact same rustc. Formatting runs on the nightly pinned in rust-nightly.txt
      # (rustfmt.toml uses unstable import options for merge resilience); build,
      # clippy and tests run on the stable toolchain pinned in rust-toolchain.toml,
      # which the bare `rustup toolchain install` resolves (along with its
      # components) and which rustup then applies to every unprefixed cargo call.
      - name: Install pinned toolchains
        run: |
          rustup toolchain install --profile minimal --component rustfmt "$(cat rust-nightly.txt)"
          rustup toolchain install --profile minimal
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo "+$(cat rust-nightly.txt)" fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features
      # Guard the lean build (issue #23): the app and karet-fileview must keep
      # compiling with the optional media/document dependencies (`hayro`, `image`,
      # `zip`/`quick-xml`) removed, and each single feature must build on its own.
      # `--all-features` (above) covers the everything-on side.
      - name: Lean build (no heavy media deps)
        run: |
          cargo build -p karet --no-default-features
          cargo build -p karet --no-default-features --features pdf
          cargo build -p karet --no-default-features --features images
          cargo build -p karet --no-default-features --features docx
          cargo build -p karet-fileview --no-default-features
          cargo build -p karet-fileview --no-default-features --features pdf
          cargo build -p karet-fileview --no-default-features --features docx

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned stable + llvm-tools-preview, both from rust-toolchain.toml.
      - name: Install pinned toolchain
        run: rustup toolchain install --profile minimal
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage report
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - name: Coverage summary
        run: cargo llvm-cov report --summary-only
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info
