#:schema https://mise.jdx.dev/schema/mise.json

# Tools are managed by mise so `mise install` provisions everything the
# hooks and tasks below need. The Rust toolchain itself is pinned via
# rust-toolchain.toml and provided by rustup.
[tools]
hk = "latest"                  # git hooks manager (reads hk.pkl)
pkl = "latest"                 # config language hk.pkl is written in
"cargo:cargo-llvm-cov" = "latest"  # code coverage

[tasks.format]
description = "Format code with rustfmt"
run = "cargo fmt --all"

[tasks.lint]
description = "Lint with clippy (deny warnings)"
run = "cargo clippy --workspace --all-targets --all-features -- -D warnings"

[tasks.lint-fix]
description = "Lint and auto-fix with clippy"
run = "cargo clippy --workspace --all-targets --all-features --fix --allow-dirty --allow-staged"

[tasks.test]
description = "Run the test suite"
run = "cargo test --workspace --all-features"

[tasks.coverage]
description = "Report line coverage with cargo-llvm-cov"
run = "cargo llvm-cov --workspace --all-features"
